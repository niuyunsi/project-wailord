services:
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    environment:
      - TZ=Asia/Shanghai
      - DOMAIN=${DOMAIN}
    volumes:
      - ./templates:/etc/nginx/templates:ro
      - certs:/etc/letsencrypt
      - certbot-www:/var/www/certbot
      - /home/ec2-user/html:/usr/share/nginx/html:ro
    command: nginx -g 'daemon off;'

  v2ray:
    image: v2fly/v2fly-core:latest
    restart: always
    ports:
      - "11055:11055"
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - v2ray-config:/etc/v2ray
    command: run -c /etc/v2ray/config.json

  certbot:
    image: certbot/certbot:latest
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - certs:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    depends_on:
      - nginx
    command: certonly --reinstall --webroot --webroot-path=/var/www/certbot/ --email ${EMAIL} --agree-tos --no-eff-email -d ${DOMAIN}

volumes:
  v2ray-config:
  certs:
  certbot-www:
